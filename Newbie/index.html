        function exportSettlementResults() {
            const data = [];
            DETAILED_INSTRUMENTS.forEach(inst => {
                const studentIds = settlementState.assignments[inst] || [];
                studentIds.forEach(id => {
                    const student = findStudentById(id);
                    if (student) {
                        data.push({
                            "姓名": student.name,
                            "分配樂器": inst
                        });
                    }
                });
            });

            if (data.length === 0) {
                alert("目前尚無分配結果可匯出。");
                return;
            }

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "分配結果");
            XLSX.writeFile(wb, "仁和管樂24屆新生樂器分配結果.xlsx");
        }

        function renderSettlement() {
            // 在重新渲染前，紀錄當前所有名單的滾動條位置
            const scrollStates = {};
            const confirmedListEl = document.getElementById('settlement-confirmed-list');
            if (confirmedListEl) {
                scrollStates['confirmed'] = confirmedListEl.scrollTop;
            }
            document.querySelectorAll('.settlement-candidate-column .settlement-card-list').forEach((el, index) => {
                scrollStates[`candidate-${index}`] = el.scrollTop;
            });

            const instrument = settlementState.activeInstrument;
            const confirmedIds = settlementState.assignments[instrument] || [];
            const confirmedStudents = confirmedIds.map(findStudentById).filter(Boolean);
            const candidateStarStudents = students.filter((student) => {
                if (confirmedIds.includes(student.id)) return false;
                return getStudentScore(student, instrument) === 'star';
            });
            const candidateColumns = [
                { key: 'star', title: '★', items: candidateStarStudents }
            ];
            if (settlementState.showCircle) {
                candidateColumns.push({
                    key: 'circle',
                    title: '○',
                    items: students.filter((student) => !confirmedIds.includes(student.id) && getStudentScore(student, instrument) === 'circle')
                });
            }
            if (settlementState.showTriangle) {
                candidateColumns.push({
                    key: 'triangle',
                    title: '△',
                    items: students.filter((student) => !confirmedIds.includes(student.id) && getStudentScore(student, instrument) === 'triangle')
                });
            }

            document.getElementById('settlement-title').textContent = `${instrument}正選名單`;
            document.getElementById('settlement-show-circle').checked = settlementState.showCircle;
            document.getElementById('settlement-show-triangle').checked = settlementState.showTriangle;
            renderSettlementInstrumentCards('settlement-left', DETAILED_INSTRUMENT_GROUPS.left);
            renderSettlementInstrumentCards('settlement-right', DETAILED_INSTRUMENT_GROUPS.right);
            renderSettlementStudentCards('settlement-confirmed-list', 'settlement-confirmed-empty', confirmedStudents, 'confirmed');
            const candidateContainer = document.getElementById('settlement-candidate-list');
            const candidateEmpty = document.getElementById('settlement-candidate-empty');
            const hasAnyCandidate = candidateColumns.some((column) => column.items.length > 0);
            if (!hasAnyCandidate) {
                candidateContainer.innerHTML = '';
                candidateContainer.style.gridTemplateColumns = '';
                candidateEmpty.classList.remove('hidden');
            } else {
                candidateEmpty.classList.add('hidden');
                candidateContainer.style.gridTemplateColumns = `repeat(${candidateColumns.length}, minmax(0, 1fr))`;
                candidateContainer.innerHTML = candidateColumns.map((column) => `
                    <section class="settlement-candidate-column">
                        <h4 class="settlement-candidate-column-title">${column.title}</h4>
                        ${buildSettlementStudentCardsMarkup(column.items, 'candidate')}
                    </section>
                `).join('');
            }

            document.getElementById('settlement-pick-btn').disabled = settlementState.selectedSource !== 'candidate';
            document.getElementById('settlement-remove-btn').disabled = settlementState.selectedSource !== 'confirmed';

            const isResultsView = settlementState.view === 'results';
            document.getElementById('settlement-assignment-top').style.display = isResultsView ? 'none' : 'flex';
            document.getElementById('settlement-assignment-bottom').style.display = isResultsView ? 'none' : 'flex';
            document.getElementById('settlement-left').style.display = isResultsView ? 'none' : 'flex';
            document.getElementById('settlement-right').style.display = isResultsView ? 'none' : 'flex';
            document.getElementById('settlement-pick-btn').style.display = isResultsView ? 'none' : 'block';
            document.getElementById('settlement-remove-btn').style.display = isResultsView ? 'none' : 'block';
            document.getElementById('settlement-result-btn').style.display = isResultsView ? 'none' : 'block';

            document.querySelector('.settlement-shell').classList.toggle('expanded-shell', isResultsView);
            document.getElementById('settlement-panel').classList.toggle('no-frame', isResultsView);
            document.getElementById('settlement-panel').classList.toggle('results-mode', isResultsView);
            document.getElementById('settlement-results').classList.toggle('active', isResultsView);
            document.getElementById('settlement-export-btn').style.display = isResultsView ? 'flex' : 'none';

            if (isResultsView) {
                renderSettlementResults();
            } else {
                // 在所有內部 DOM 建立完畢且顯示後，復原剛才紀錄的滾動位置
                const newConfirmedListEl = document.getElementById('settlement-confirmed-list');
                if (newConfirmedListEl && scrollStates['confirmed']) {
                    newConfirmedListEl.scrollTop = scrollStates['confirmed'];
                }
                document.querySelectorAll('.settlement-candidate-column .settlement-card-list').forEach((el, index) => {
                    if (scrollStates[`candidate-${index}`]) {
                        el.scrollTop = scrollStates[`candidate-${index}`];
                    }
                });
            }
        }

        function onEndBtnClick() {
            if (currentStatus === 'running' || currentStatus === 'temp-edit') {
                if (isEditMode) disableEditMode();
                updateSystemStatus('finished');
            } else if (currentStatus === 'finished') {
                updateSystemStatus('temp-edit');
            }
        }

        function applyStatus(status) {
            const startBtn = document.getElementById('start-btn'), endBtn = document.getElementById('end-btn'), settleBtn = document.getElementById('settle-btn'), title = document.getElementById('main-title'), moreBtn = document.getElementById('more-btn');

            // 重置全部按鈕狀態 (跑關狀態)
            startBtn.innerText = "▶ 開始跑關";
            startBtn.classList.remove('hidden', 'bg-emerald-500', 'text-white', 'opacity-60', 'pointer-events-none');
            endBtn.classList.remove('hidden', 'bg-red-500', 'text-white', 'opacity-60', 'pointer-events-none', 'bg-orange-100', 'text-orange-700', 'border-orange-300', 'hover:bg-orange-500', 'hover:text-white');
            endBtn.classList.add('bg-white', 'border-red-500', 'text-red-600', 'hover:bg-red-500'); // 回復原本的跑關結束樣式
            endBtn.innerText = "■ 跑關結束";
            settleBtn.classList.add('hidden');
            document.body.classList.remove('status-finished');

            // 處理左側 More 選單 disabled
            const moreMenuIds = ['menu-upload', 'menu-clear', 'menu-reset', 'menu-logout'];
            moreMenuIds.forEach(id => {
                const btn = document.getElementById(id);
                if (btn) {
                    if (status === 'running' || status === 'temp-edit') {
                        btn.style.opacity = '0.3';
                        btn.disabled = true; // 放棄 pointer-events 改用原生 disabled
                    } else {
                        btn.style.opacity = '1';
                        btn.disabled = false;
                    }
                }
            });

            if (status === 'running') {
                startBtn.classList.add('hidden');
                title.innerText = "跑關狀態：進行中";
            } else if (status === 'finished') {
                startBtn.classList.add('hidden');
                // 將 endBtn 轉變為 "臨時修改" 按鈕
                endBtn.classList.remove('bg-white', 'border-red-500', 'text-red-600', 'hover:bg-red-500');
                endBtn.classList.add('bg-orange-100', 'text-orange-700', 'border-orange-300', 'hover:bg-orange-500', 'hover:text-white');
                endBtn.innerText = "▶ 臨時修改";
                settleBtn.classList.remove('hidden');
                document.body.classList.add('status-finished');
                title.innerText = "跑關狀態：已結束";
            } else if (status === 'temp-edit') {
                startBtn.classList.add('hidden');
                title.innerText = "跑關狀態：臨時修改中";
                // 此時 endBtn 維持 "■ 跑關結束"
            } else {
                title.innerText = "仁和國中第24屆管樂團樂器挑選";
            }
        }

        // 處理左下角更多選單的開關邏輯
        function toggleMoreMenu(event) {
            event.stopPropagation();
            const menu = document.getElementById('more-menu');
            if (menu) {
                menu.classList.toggle('active');
            }
        }

        document.addEventListener('click', function (e) {
            const menu = document.getElementById('more-menu');
            const btn = document.getElementById('more-btn');
            if (menu && menu.classList.contains('active')) {
                // 如果點擊了畫面以外，或是點擊了選單內的某個按鈕（且不是字體調整按鈕），就收合選單
                const isFontSizeBtn = e.target.closest('button') && e.target.closest('button').outerHTML.includes('updateFontSizeOffset');
                if (e.target !== btn && (!menu.contains(e.target) || (e.target.closest('button') && !isFontSizeBtn))) {
                    menu.classList.remove('active');
                }
            }
        });

        // 支援 Esc 鍵退出全螢幕
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && document.fullscreenElement) {
                document.exitFullscreen().catch(() => { });
            }
        });

        // 7. 檔案讀取 (防呆修正版：允許重複選同一個檔案)
        document.getElementById('excel-upload').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                students = json.map(row => ({
                    id: createStudentId(),
                    name: String(row['姓名'] || row['Name'] || Object.values(row)[1] || "未知").trim(),
                    school: String(row['國小'] || row['School'] || Object.values(row)[0] || "").trim(),
                    scores: {}
                }));
                saveData(); renderStudents();
            };
            reader.readAsArrayBuffer(file);
            e.target.value = ''; // 關鍵！清空選擇，允許下次選同一份檔案
        });

        }

        }

        function manageEventPassword() {
            const newPin = prompt(`目前的活動密碼是：${currentEventPassword}\n若要修改，請直接於下方輸入新密碼。\n(若不想修改請直接點取消關閉)`, currentEventPassword);
            if (newPin !== null && newPin.trim() !== '') {
                db.ref('system/auth/pin').set(newPin.trim());
                alert('活動密碼已更新！手機端若輸入舊密碼將被退出。');
            }
        }

        function enterSystem() {
            const savedData = localStorage.getItem('music_band_data'), savedStatus = localStorage.getItem('music_band_status');
            if (savedData) {
                try {
                    students = JSON.parse(savedData);
                } catch (e) { students = []; }
            } else {
                students = [];
            }
            ensureStudentIds(students);

            if (savedStatus) currentStatus = savedStatus;
            else currentStatus = 'setup';

            settlementState.assignments = normalizeSettlementAssignments(JSON.parse(localStorage.getItem('music_band_settlement') || 'null'));

            applyStatus(currentStatus);
            renderStudents();
            startFirebaseSync();
            updateFontSizeOffset(0);
        }

        function logoutAdmin() {
            if (!confirm('確定要登出嗎？')) return;
            sessionStorage.removeItem('admin_verified');
            location.reload();
        }

        window.onload = () => {
            const isVerified = sessionStorage.getItem('admin_verified') === 'true';

            if (isVerified) {
                document.getElementById('admin-auth-overlay').classList.add('hidden');
                enterSystem();
            } else {
                document.getElementById('admin-auth-overlay').classList.remove('hidden');
            }
        };

    </script>
</body>

</html>
